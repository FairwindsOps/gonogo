addons:
- name: argocd
  versions:
    start: 9.4.15
    end: 9.5.6
  notes: https://github.com/argoproj/argo-helm/releases/tag/argo-cd-9.5.6
  source:
    chart: argo-cd
    repository: https://argoproj.github.io/argo-helm
  warnings:
  - "Argo CD chart 9.5.6 deploys Argo CD appVersion v3.3.8 and requires Kubernetes >=1.25.0-0."
  - "If Argo CD CRDs are managed outside this chart or crds.install=false is set, apply the v3.3.8 CRDs with server-side apply before or during the upgrade."
  - "Chart 9.5.6 adds HTTPRoute support to the ApplicationSet webhook. Ensure Gateway API CRDs are installed before enabling optional ApplicationSet webhook HTTPRoute configuration."
  compatible_k8s_versions:
    min: 1.25
  necessary_api_versions:
  - apiextensions.k8s.io/v1
  - apps/v1
  - v1
  values_schema: ""
  resources:
  opa_checks:
